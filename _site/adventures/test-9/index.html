<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Navbar burger
    const burgers = document.querySelectorAll('.navbar-burger');
    burgers.forEach(burger => {
      burger.addEventListener('click', () => {
        const target = document.getElementById(burger.dataset.target);
        burger.classList.toggle('is-active');
        target.classList.toggle('is-active');
      });
    });

    if (!window.netlifyIdentity) return;

    function getUserRole(user) {
      return user?.app_metadata?.roles || [];
    }

    function applyNav(user) {
      const roles = getUserRole(user);
      const isAdmin = roles.includes('admin');
      const isParent = roles.includes('parent');
      const isLoggedIn = !!user;

      // Toggle member links (parent + admin)
      document.querySelectorAll('.nav-members').forEach(el => {
        el.style.display = (isAdmin || isParent) ? '' : 'none';
      });

      // Toggle admin links
      document.querySelectorAll('.nav-admin').forEach(el => {
        el.style.display = isAdmin ? '' : 'none';
      });

      // Toggle login/logout
      document.querySelectorAll('.nav-loggedout').forEach(el => {
        el.style.display = isLoggedIn ? 'none' : '';
      });
      document.querySelectorAll('.nav-loggedin').forEach(el => {
        el.style.display = isLoggedIn ? '' : 'none';
      });

      // Show name
      if (user) {
        const name = user.user_metadata?.full_name || user.email;
        document.getElementById('nav-user-name').textContent = `Hi, ${name.split(' ')[0]}!`;
      }
    }

    netlifyIdentity.on('init', user => applyNav(user));
    netlifyIdentity.on('login', user => {
      applyNav(user);
      netlifyIdentity.close();
    });
    netlifyIdentity.on('logout', () => applyNav(null));

    document.getElementById('nav-login-btn')?.addEventListener('click', () => {
      netlifyIdentity.open('login');
    });
    document.getElementById('nav-logout-btn')?.addEventListener('click', () => {
      netlifyIdentity.logout();
    });
  });
</script>
